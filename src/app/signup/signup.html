<div class="signup-grid">
<p-toast></p-toast>

  <div class="signup-card">
    <h2>Sign Up</h2>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">

      <div class="form-row">
        <span class="p-float-label">
          <input
            id="email"
            pInputText
            formControlName="email"
            placeholder="Enter your email"
            class="p-inputtext-lg"
          />
          <label class="labelClass" for="email">Email</label>
        </span>
      </div>

      <div class="form-row">
        <span class="p-float-label">
          <p-password
            inputId="password"
            formControlName="password"
            placeholder="Enter your password"
            [toggleMask]="true"
            [feedback]="true"
            inputStyleClass="p-inputtext-lg"
          ></p-password>
          <label class="labelClass" for="password">Password</label>
        </span>
      </div>

      <div class="form-row">
        <span class="p-float-label">
          <p-password
            inputId="confirmPassword"
            formControlName="confirmPassword"
            placeholder="Confirm your password"
            [toggleMask]="true"
            [feedback]="false"
            inputStyleClass="p-inputtext-lg"
          ></p-password>
          <label class="labelClass" for="confirmPassword">Confirm Password</label>
        </span>
      </div>

      <div class="form-row">
        <div *ngIf="signupForm.errors?.['mismatch'] && confirmPassword?.touched"
             class="error-message">
          Passwords do not match.
        </div>
      </div>

      <div class="form-row">
        <button
          pButton
          type="submit"
          [disabled]="signupForm.invalid"
          class="signup-button p-button-lg"
        >
          Sign Up
        </button>
      </div>

      <div class="form-row links">
        <a routerLink="/login-in" class="link">Already have an account? Log in</a>
      </div>

    </form>
  </div>
</div>
