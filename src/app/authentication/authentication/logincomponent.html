<div class="login-grid">
  <p-toast></p-toast>
  <div class="login-card">
    <h2>Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <div class="form-row">
        <span class="p-float-label">
          <input
            id="email"
            pInputText
            formControlName="email"
            placeholder="Enter your email"
            class="p-inputtext-lg"
          />
            <label class="labelClass" for="email">Email</label>
        </span>
      </div>

      <div class="form-row">
        <span class="p-float-label">
          <p-password
            inputId="password"
            formControlName="password"
            placeholder="Enter your password"
            [toggleMask]="true"
            [feedback]="false"
            inputStyleClass="p-inputtext-lg"
          ></p-password>
            <label class="labelClass" for="password">Password</label>
        </span>
      </div>

      <div class="form-row">
        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>
      </div>

      <div class="form-row">
        <button
          pButton
          type="submit"
          [disabled]="loginForm.invalid"
          class="login-button p-button-lg"
        >
          Log in
        </button>
      </div>

      <div class="form-row links">
        <a routerLink="/signup" class="link">New user? Sign up</a>
        <a routerLink="/forgot-password" class="link">Forgot password?</a>
      </div>

    </form>
  </div>
</div>
