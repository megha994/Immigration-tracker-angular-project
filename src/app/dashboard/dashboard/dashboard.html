<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<section class="dashboard-shell">
  <header class="dashboard-header">
    <h2>Your Progress</h2>
    <p-progressBar [value]="progressValue" [showValue]="false"></p-progressBar>
  </header>

  <div class="progress-grid">
    <p-card
      class="progress-card"
      *ngFor="let card of cards"
      [ngClass]="{ clickable: card.clickable }"
      (click)="onCardClick(card)">
      <div class="progress-card-main">
        <i [class]="card.icon" class="card-icon"></i>
        <div>
          <h3>{{ card.title }}</h3>
          <p class="card-subtitle">
            <i class="pi pi-check status-icon"></i>
            Completed
          </p>
        </div>
      </div>
    </p-card>
  </div>

  <p-card class="deadline-card" [ngClass]="deadlineColor">
    <div class="deadline-main">
      <h3>Deadline</h3>
      <p>{{ deadlineText }}</p>
    </div>
    <i class="pi pi-clock deadline-icon"></i>
  </p-card>
</section>
