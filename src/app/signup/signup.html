<div class="signup-container">
  <p-card class="signup-card">
    <h2>Sign Up</h2>
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">
      <span class="p-float-label">
        <input
          id="email"
          pInputText
          formControlName="email"
          placeholder="Enter your email"
          class="p-inputtext-lg"
        />
        <label for="email">Email</label>
      </span>

      <span class="p-float-label">
        <p-password
          inputId="password"
          formControlName="password"
          placeholder="Enter your password"
          [toggleMask]="true"
          [feedback]="true"
          inputStyleClass="p-inputtext-lg"
        ></p-password>
        <label for="password">Password</label>
      </span>

      <span class="p-float-label">
        <p-password
          inputId="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Confirm your password"
          [toggleMask]="true"
          [feedback]="false"
          inputStyleClass="p-inputtext-lg"
        ></p-password>
        <label for="confirmPassword">Confirm Password</label>
      </span>

      <div *ngIf="signupForm.errors?.['mismatch'] && signupForm.get('confirmPassword')?.touched" class="error-message">
        Passwords do not match.
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <button
        pButton
        type="submit"
        [disabled]="signupForm.invalid"
        class="signup-button p-button-lg"
      >
        Sign Up
      </button>

      <div class="links">
        <a routerLink="/login-in" class="link">Already have an account? Log in</a>
      </div>
    </form>
  </p-card>
</div>
